<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>AluraFlix</title>
</head>

<body>
    <main>
        <h1>Quem está assistindo?</h1>
        <ul class="profiles">
            <li class="profile">
                <ol>
                    <li><img src="./assets/perfil1.png"
                        alt="Uma personagem aventureira com tranças e um visual confiante, sobre um fundo roxo intenso."></li>
                    <li><p>Dandara</p></li>
                </ol>
            </li>
            <li class="profile">
                <ol>
                    <li><img src="./assets/perfil2.png"
                        alt="Um gato estiloso usando um gorro colorido, sobre um fundo amarelo vibrante."></li>
                    <li><p>Oliver</p></li>
                </ol>
            </li>
            <li class="profile">
                <ol>
                    <li><img src="./assets/perfil3.png"
                        alt="Um jovem de gorro com uma expressão misteriosa e um logo de caveira, sobre um fundo verde escuro."></li>
                    <li><p>Caio</p></li>
                </ol>
            </li>
            <li class="profile">
                <ol>
                    <li><img src="./assets/perfil4.png"
                        alt="Uma mulher de cabelos ruivos e óculos, com uma expressão alegre, sobre um fundo vermelho brilhante."></li>
                    <li><p>Letícia</p></li>
                </ol>
            </li>
            <li class="profile">
                <ol>
                    <li><img src="./assets/perfil5.png"
                        alt="Um homem de barba e capuz, com um sorriso amigável, sobre um fundo azul vibrante."></li>
                    <li><p>Gabriel</p></li>
                </ol>
            </li>
        </ul>
    </main>
</body>

</html>
